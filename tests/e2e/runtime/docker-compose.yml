services:
  postgres:
    image: postgres:16-alpine
    tmpfs:
      - /var/lib/postgresql/data
    environment:
      POSTGRES_USER: sqltgen
      POSTGRES_PASSWORD: sqltgen
      POSTGRES_DB: sqltgen_e2e
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqltgen"]
      interval: 1s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8
    tmpfs:
      - /var/lib/mysql
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    environment:
      MYSQL_ROOT_PASSWORD: sqltgen
      MYSQL_DATABASE: sqltgen_e2e
      MYSQL_USER: sqltgen
      MYSQL_PASSWORD: sqltgen
    ports:
      - "13306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 1s
      timeout: 5s
      retries: 20
