services:
  postgres:
    image: ghcr.io/sqltgen/db-postgres:latest
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqltgen"]
      interval: 1s
      timeout: 5s
      retries: 10

  mysql:
    image: ghcr.io/sqltgen/db-mysql:latest
    ports:
      - "13306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "sqltgen", "-psqltgen"]
      interval: 1s
      timeout: 5s
      retries: 20
