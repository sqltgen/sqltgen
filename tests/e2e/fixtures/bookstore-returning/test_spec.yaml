# Test specification for the bookstore-returning fixture.
#
# PostgreSQL-only: tests INSERT/UPDATE/DELETE ... RETURNING * which
# returns the affected row as a :one query result.

fixture: bookstore-returning

scenarios:
  # ── INSERT ... RETURNING ───────────────────────────────────────────

  - name: create_author_returns_row
    section: "INSERT RETURNING"
    steps:
      - call: create_author
        args:
          name: {str: "Asimov"}
          bio: {str: "Sci-fi master"}
          birth_year: {int: 1920}
        bind: author
      - assert_not_null: author
      - assert_eq: {field: author.name, value: {str: "Asimov"}}
      - assert_eq: {field: author.bio, value: {str: "Sci-fi master"}}
      - assert_eq: {field: author.birth_year, value: {int: 1920}}

  - name: create_author_null_bio
    section: "INSERT RETURNING"
    steps:
      - call: create_author
        args:
          name: {str: "Herbert"}
          bio: {null: true}
          birth_year: {int: 1920}
        bind: author
      - assert_not_null: author
      - assert_eq: {field: author.name, value: {str: "Herbert"}}
      - assert_null: author.bio

  - name: create_book_returns_row
    section: "INSERT RETURNING"
    steps:
      - call: create_author
        args: {name: {str: "Author"}, bio: {null: true}, birth_year: {int: 1900}}
      - call: create_book
        args:
          author_id: {int: 1}
          title: {str: "Dune"}
          genre: {str: "sci-fi"}
          price: {float: 12.99}
          published_at: {date: "1965-06-01"}
        bind: book
      - assert_not_null: book
      - assert_eq: {field: book.title, value: {str: "Dune"}}
      - assert_eq: {field: book.genre, value: {str: "sci-fi"}}

  # ── UPDATE ... RETURNING ───────────────────────────────────────────

  - name: update_author_bio_returns_row
    section: "UPDATE RETURNING"
    steps:
      - call: create_author
        args: {name: {str: "Author"}, bio: {str: "Old bio"}, birth_year: {int: 1900}}
      - call: update_author_bio
        args:
          bio: {str: "New bio"}
          id: {int: 1}
        bind: updated
      - assert_not_null: updated
      - assert_eq: {field: updated.name, value: {str: "Author"}}
      - assert_eq: {field: updated.bio, value: {str: "New bio"}}

  - name: update_author_bio_to_null
    section: "UPDATE RETURNING"
    steps:
      - call: create_author
        args: {name: {str: "Author"}, bio: {str: "Has bio"}, birth_year: {int: 1900}}
      - call: update_author_bio
        args:
          bio: {null: true}
          id: {int: 1}
        bind: updated
      - assert_not_null: updated
      - assert_null: updated.bio

  # ── DELETE ... RETURNING ───────────────────────────────────────────

  - name: delete_author_returns_row
    section: "DELETE RETURNING"
    steps:
      - call: create_author
        args: {name: {str: "ToDelete"}, bio: {null: true}, birth_year: {int: 1900}}
      - call: delete_author
        args: {id: {int: 1}}
        bind: deleted
      - assert_not_null: deleted
      - assert_eq: {field: deleted.name, value: {str: "ToDelete"}}
      - call: get_author
        args: {id: {int: 1}}
        bind: gone
      - assert_null: gone

  - name: delete_author_not_found
    section: "DELETE RETURNING"
    steps:
      - call: delete_author
        args: {id: {int: 999}}
        bind: result
      - assert_null: result
