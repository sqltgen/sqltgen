# Test specification for the enums fixture.
#
# Verifies that CREATE TYPE ... AS ENUM types are correctly parsed,
# resolved to typed enum parameters/columns, and round-tripped through
# the generated code against a real database.
#
# The {enum: "value"} typed value is rendered per-language:
#   Java/Kotlin:  EnumType.fromValue("value") or EnumType.VALUE
#   Go:           gen.EnumTypeValue (string constant)
#   Python:       EnumType.VALUE or EnumType("value")
#   Rust:         EnumType::Value or "value".parse().unwrap()
#   TypeScript:   "value" (string union)

fixture: enums

scenarios:
  # ── :one — create and retrieve ──────────────────────────────────────

  - name: create_and_get_task
    section: ":one queries"
    steps:
      - call: create_task
        args:
          title: {str: "Fix bug"}
          priority: {str: "high"}
          status: {str: "open"}
          description: {str: "Fix the login bug"}
        bind: task
      - assert_not_null: task
      - assert_eq: {field: task.title, value: {str: "Fix bug"}}
      - assert_eq: {field: task.priority, value: {str: "high"}}
      - assert_eq: {field: task.status, value: {str: "open"}}
      - assert_eq: {field: task.description, value: {str: "Fix the login bug"}}

  - name: get_task_not_found
    section: ":one queries"
    steps:
      - call: get_task
        args: {id: {int: 999}}
        bind: result
      - assert_null: result

  # ── :one — update enum column ───────────────────────────────────────

  - name: update_task_status
    section: ":one queries"
    steps:
      - call: create_task
        args:
          title: {str: "Deploy"}
          priority: {str: "critical"}
          status: {str: "open"}
          description: {null: true}
        bind: task
      - call: update_task_status
        args:
          status: {str: "in_progress"}
          id: {int: 1}
        bind: updated
      - assert_not_null: updated
      - assert_eq: {field: updated.status, value: {str: "in_progress"}}
      - assert_eq: {field: updated.priority, value: {str: "critical"}}

  # ── :many — filter by enum ──────────────────────────────────────────

  - name: list_by_priority
    section: ":many queries"
    steps:
      - call: create_task
        args: {title: {str: "Low task"}, priority: {str: "low"}, status: {str: "open"}, description: {null: true}}
      - call: create_task
        args: {title: {str: "High task 1"}, priority: {str: "high"}, status: {str: "open"}, description: {null: true}}
      - call: create_task
        args: {title: {str: "High task 2"}, priority: {str: "high"}, status: {str: "done"}, description: {null: true}}
      - call: list_tasks_by_priority
        args: {priority: {str: "high"}}
        bind: tasks
      - assert_len: {var: tasks, value: 2}
      - assert_eq: {field: "tasks[0].title", value: {str: "High task 1"}}
      - assert_eq: {field: "tasks[1].title", value: {str: "High task 2"}}

  - name: list_by_status
    section: ":many queries"
    steps:
      - call: create_task
        args: {title: {str: "Open 1"}, priority: {str: "low"}, status: {str: "open"}, description: {null: true}}
      - call: create_task
        args: {title: {str: "Done 1"}, priority: {str: "medium"}, status: {str: "done"}, description: {null: true}}
      - call: create_task
        args: {title: {str: "Open 2"}, priority: {str: "high"}, status: {str: "open"}, description: {null: true}}
      - call: list_tasks_by_status
        args: {status: {str: "open"}}
        bind: tasks
      - assert_len: {var: tasks, value: 2}

  # ── :many — nullable enum filter ────────────────────────────────────

  - name: list_by_priority_or_all
    section: ":many queries"
    steps:
      - call: create_task
        args: {title: {str: "Low"}, priority: {str: "low"}, status: {str: "open"}, description: {null: true}}
      - call: create_task
        args: {title: {str: "High"}, priority: {str: "high"}, status: {str: "open"}, description: {null: true}}
      - call: list_tasks_by_priority_or_all
        args: {priority: {null: true}}
        bind: all_tasks
      - assert_len: {var: all_tasks, value: 2}
      - call: list_tasks_by_priority_or_all
        args: {priority: {str: "high"}}
        bind: high_tasks
      - assert_len: {var: high_tasks, value: 1}
      - assert_eq: {field: "high_tasks[0].title", value: {str: "High"}}

  # ── :many — aggregate with enum grouping ────────────────────────────

  - name: count_by_status
    section: ":many queries"
    steps:
      - call: create_task
        args: {title: {str: "A"}, priority: {str: "low"}, status: {str: "open"}, description: {null: true}}
      - call: create_task
        args: {title: {str: "B"}, priority: {str: "low"}, status: {str: "open"}, description: {null: true}}
      - call: create_task
        args: {title: {str: "C"}, priority: {str: "high"}, status: {str: "done"}, description: {null: true}}
      - call: count_by_status
        bind: counts
      - assert_len: {var: counts, value: 2}

  # ── enum array — create, read, update ────────────────────────────────

  - name: create_with_enum_array
    section: "enum array queries"
    steps:
      - call: create_task_with_tags
        args:
          title: {str: "Tagged task"}
          priority: {str: "high"}
          status: {str: "open"}
          description: {null: true}
          tags: {list: [{str: "high"}, {str: "critical"}]}
        bind: task
      - assert_not_null: task
      - assert_eq: {field: task.title, value: {str: "Tagged task"}}
      - assert_len: {var: task.tags, value: 2}
      - assert_eq: {field: "task.tags[0]", value: {str: "high"}}
      - assert_eq: {field: "task.tags[1]", value: {str: "critical"}}

  - name: get_task_tags
    section: "enum array queries"
    steps:
      - call: create_task_with_tags
        args:
          title: {str: "Read tags"}
          priority: {str: "low"}
          status: {str: "open"}
          description: {null: true}
          tags: {list: [{str: "low"}, {str: "medium"}, {str: "high"}]}
      - call: get_task_tags
        args: {id: {int: 1}}
        bind: row
      - assert_not_null: row
      - assert_len: {var: row.tags, value: 3}
      - assert_eq: {field: "row.tags[0]", value: {str: "low"}}
      - assert_eq: {field: "row.tags[1]", value: {str: "medium"}}
      - assert_eq: {field: "row.tags[2]", value: {str: "high"}}

  - name: update_task_tags
    section: "enum array queries"
    steps:
      - call: create_task_with_tags
        args:
          title: {str: "Update tags"}
          priority: {str: "medium"}
          status: {str: "open"}
          description: {null: true}
          tags: {list: [{str: "low"}]}
      - call: update_task_tags
        args:
          tags: {list: [{str: "high"}, {str: "critical"}]}
          id: {int: 1}
        bind: updated
      - assert_not_null: updated
      - assert_len: {var: updated.tags, value: 2}
      - assert_eq: {field: "updated.tags[0]", value: {str: "high"}}
      - assert_eq: {field: "updated.tags[1]", value: {str: "critical"}}

  - name: empty_enum_array
    section: "enum array queries"
    steps:
      - call: create_task_with_tags
        args:
          title: {str: "No tags"}
          priority: {str: "low"}
          status: {str: "open"}
          description: {null: true}
          tags: {list: []}
      - call: get_task_tags
        args: {id: {int: 1}}
        bind: row
      - assert_not_null: row
      - assert_len: {var: row.tags, value: 0}

  # ── :exec — delete ──────────────────────────────────────────────────

  - name: delete_task
    section: ":exec queries"
    steps:
      - call: create_task
        args: {title: {str: "Temp"}, priority: {str: "low"}, status: {str: "open"}, description: {null: true}}
      - call: delete_task
        args: {id: {int: 1}}
      - call: get_task
        args: {id: {int: 1}}
        bind: result
      - assert_null: result
