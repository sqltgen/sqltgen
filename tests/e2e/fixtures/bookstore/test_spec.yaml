# Test specification for the bookstore fixture.
#
# Covers core SQL patterns using queries common to all three engines.
# PG-specific RETURNING queries (CreateAuthor :one, etc.) are excluded —
# they belong in a separate bookstore-returning fixture.

fixture: bookstore

scenarios:
  # ── :one queries ───────────────────────────────────────────────────

  - name: get_author
    section: ":one queries"
    steps:
      - call: create_author
        args:
          name: {str: "Asimov"}
          bio: {str: "Sci-fi master"}
          birth_year: {int: 1920}
      - call: get_author
        args: {id: {int: 1}}
        bind: author
      - assert_not_null: author
      - assert_eq: {field: author.name, value: {str: "Asimov"}}
      - assert_eq: {field: author.bio, value: {str: "Sci-fi master"}}
      - assert_eq: {field: author.birth_year, value: {int: 1920}}

  - name: get_author_not_found
    section: ":one queries"
    steps:
      - call: get_author
        args: {id: {int: 999}}
        bind: result
      - assert_null: result

  - name: get_book
    section: ":one queries"
    steps:
      - call: create_author
        args: {name: {str: "Herbert"}, bio: {null: true}, birth_year: {int: 1920}}
      - call: create_book
        args:
          author_id: {int: 1}
          title: {str: "Dune"}
          genre: {str: "sci-fi"}
          price: {float: 12.99}
          published_at: {date: "1965-06-01"}
      - call: get_book
        args: {id: {int: 1}}
        bind: book
      - assert_not_null: book
      - assert_eq: {field: book.title, value: {str: "Dune"}}
      - assert_eq: {field: book.genre, value: {str: "sci-fi"}}

  # ── :many queries ──────────────────────────────────────────────────

  - name: list_authors
    section: ":many queries"
    steps:
      - call: create_author
        args: {name: {str: "Asimov"}, bio: {null: true}, birth_year: {int: 1920}}
      - call: create_author
        args: {name: {str: "Herbert"}, bio: {null: true}, birth_year: {int: 1920}}
      - call: list_authors
        bind: authors
      - assert_len: {var: authors, value: 2}
      - assert_eq: {field: "authors[0].name", value: {str: "Asimov"}}
      - assert_eq: {field: "authors[1].name", value: {str: "Herbert"}}

  - name: list_books_by_genre
    section: ":many queries"
    steps:
      - call: create_author
        args: {name: {str: "A"}, bio: {null: true}, birth_year: {int: 1900}}
      - call: create_book
        args: {author_id: {int: 1}, title: {str: "SciFi1"}, genre: {str: "sci-fi"}, price: {float: 9.99}, published_at: {null: true}}
      - call: create_book
        args: {author_id: {int: 1}, title: {str: "Fantasy1"}, genre: {str: "fantasy"}, price: {float: 11.99}, published_at: {null: true}}
      - call: list_books_by_genre
        args: {genre: {str: "sci-fi"}}
        bind: books
      - assert_len: {var: books, value: 1}
      - assert_eq: {field: "books[0].title", value: {str: "SciFi1"}}

  - name: list_books_by_genre_or_all
    section: ":many queries"
    steps:
      - call: create_author
        args: {name: {str: "A"}, bio: {null: true}, birth_year: {int: 1900}}
      - call: create_book
        args: {author_id: {int: 1}, title: {str: "B1"}, genre: {str: "sci-fi"}, price: {float: 9.99}, published_at: {null: true}}
      - call: create_book
        args: {author_id: {int: 1}, title: {str: "B2"}, genre: {str: "fantasy"}, price: {float: 9.99}, published_at: {null: true}}
      - call: list_books_by_genre_or_all
        args: {genre: {null: true}}
        bind: all_books
      - assert_len: {var: all_books, value: 2}
      - call: list_books_by_genre_or_all
        args: {genre: {str: "sci-fi"}}
        bind: scifi
      - assert_len: {var: scifi, value: 1}

  - name: list_books_with_author_join
    section: ":many queries"
    steps:
      - call: create_author
        args: {name: {str: "Author A"}, bio: {str: "Bio A"}, birth_year: {int: 1920}}
      - call: create_book
        args: {author_id: {int: 1}, title: {str: "Book A"}, genre: {str: "sci-fi"}, price: {float: 9.99}, published_at: {null: true}}
      - call: list_books_with_author
        bind: rows
      - assert_len: {var: rows, value: 1}
      - assert_eq: {field: "rows[0].author_name", value: {str: "Author A"}}

  # ── NULL handling ──────────────────────────────────────────────────

  - name: authors_with_null_bio
    section: "NULL handling"
    steps:
      - call: create_author
        args: {name: {str: "WithBio"}, bio: {str: "Has bio"}, birth_year: {int: 1900}}
      - call: create_author
        args: {name: {str: "NoBio"}, bio: {null: true}, birth_year: {int: 1900}}
      - call: get_authors_with_null_bio
        bind: authors
      - assert_len: {var: authors, value: 1}
      - assert_eq: {field: "authors[0].name", value: {str: "NoBio"}}

  - name: authors_with_bio
    section: "NULL handling"
    steps:
      - call: create_author
        args: {name: {str: "WithBio"}, bio: {str: "Bio"}, birth_year: {int: 1900}}
      - call: create_author
        args: {name: {str: "NoBio"}, bio: {null: true}, birth_year: {int: 1900}}
      - call: get_authors_with_bio
        bind: authors
      - assert_len: {var: authors, value: 1}
      - assert_eq: {field: "authors[0].name", value: {str: "WithBio"}}

  # ── :exec queries ─────────────────────────────────────────────────

  - name: add_sale_item
    section: ":exec queries"
    steps:
      - call: create_author
        args: {name: {str: "A"}, bio: {null: true}, birth_year: {int: 1900}}
      - call: create_customer
        args: {name: {str: "Customer"}, email: {str: "c@example.com"}}
      - call: create_book
        args: {author_id: {int: 1}, title: {str: "Book"}, genre: {str: "sci-fi"}, price: {float: 10.0}, published_at: {null: true}}
      - call: create_sale
        args: {customer_id: {int: 1}}
      - call: add_sale_item
        args: {sale_id: {int: 1}, book_id: {int: 1}, quantity: {int: 3}, unit_price: {float: 10.0}}

  # ── :execrows queries ──────────────────────────────────────────────

  - name: delete_book_by_id
    section: ":execrows queries"
    steps:
      - call: create_author
        args: {name: {str: "A"}, bio: {null: true}, birth_year: {int: 1900}}
      - call: create_book
        args: {author_id: {int: 1}, title: {str: "Book1"}, genre: {str: "sci-fi"}, price: {float: 10.0}, published_at: {null: true}}
      - call: delete_book_by_id
        args: {id: {int: 1}}
        bind: affected
      - assert_eq: {field: affected, value: {int: 1}}

  # ── CTE / aggregates ──────────────────────────────────────────────

  - name: count_books_by_genre
    section: "aggregates"
    steps:
      - call: create_author
        args: {name: {str: "A"}, bio: {null: true}, birth_year: {int: 1900}}
      - call: create_book
        args: {author_id: {int: 1}, title: {str: "B1"}, genre: {str: "sci-fi"}, price: {float: 10.0}, published_at: {null: true}}
      - call: create_book
        args: {author_id: {int: 1}, title: {str: "B2"}, genre: {str: "sci-fi"}, price: {float: 10.0}, published_at: {null: true}}
      - call: create_book
        args: {author_id: {int: 1}, title: {str: "B3"}, genre: {str: "fantasy"}, price: {float: 10.0}, published_at: {null: true}}
      - call: count_books_by_genre
        bind: counts
      - assert_len: {var: counts, value: 2}

  # ── BETWEEN / search ──────────────────────────────────────────────

  - name: get_books_by_price_range
    section: "filtering"
    steps:
      - call: create_author
        args: {name: {str: "A"}, bio: {null: true}, birth_year: {int: 1900}}
      - call: create_book
        args: {author_id: {int: 1}, title: {str: "Cheap"}, genre: {str: "sci-fi"}, price: {float: 5.0}, published_at: {null: true}}
      - call: create_book
        args: {author_id: {int: 1}, title: {str: "Mid"}, genre: {str: "sci-fi"}, price: {float: 10.0}, published_at: {null: true}}
      - call: create_book
        args: {author_id: {int: 1}, title: {str: "Expensive"}, genre: {str: "sci-fi"}, price: {float: 20.0}, published_at: {null: true}}
      - call: get_books_by_price_range
        args: {price: {float: 7.0}, price_2: {float: 15.0}}
        bind: books
      - assert_len: {var: books, value: 1}
      - assert_eq: {field: "books[0].title", value: {str: "Mid"}}

  - name: search_books_by_title
    section: "filtering"
    steps:
      - call: create_author
        args: {name: {str: "A"}, bio: {null: true}, birth_year: {int: 1900}}
      - call: create_book
        args: {author_id: {int: 1}, title: {str: "Foundation"}, genre: {str: "sci-fi"}, price: {float: 9.99}, published_at: {null: true}}
      - call: create_book
        args: {author_id: {int: 1}, title: {str: "Dune"}, genre: {str: "sci-fi"}, price: {float: 12.99}, published_at: {null: true}}
      - call: search_books_by_title
        args: {pattern: {str: "%ound%"}}
        bind: books
      - assert_len: {var: books, value: 1}
      - assert_eq: {field: "books[0].title", value: {str: "Foundation"}}

engine_overrides:
  sqlite:
    type_coercions:
      datetime: string
      date: string
      uuid: string
  mysql:
    type_coercions:
      datetime: naive_datetime
      uuid: string
