# Test specification for the schema_qualified fixture.
#
# Verifies that tables in non-default schemas get prefixed model names
# (e.g. Internal_AuditLog) and that generated queries work against a
# real database with multiple schemas.

fixture: schema_qualified

scenarios:
  # ── public schema (default, no prefix) ─────────────────────────────

  - name: get_user_from_public_schema
    section: "public schema queries"
    steps:
      - call: get_user
        args: {id: {int: 999}}
        bind: result
      - assert_null: result

  # ── internal schema (prefixed model) ───────────────────────────────

  - name: create_and_list_audit_logs
    section: "cross-schema queries"
    steps:
      - call: create_audit_log
        args:
          user_id: {int: 1}
          action: {str: "login"}
      - call: create_audit_log
        args:
          user_id: {int: 1}
          action: {str: "view_dashboard"}
      - call: list_audit_logs
        bind: logs
      - assert_len: {var: logs, value: 2}
      - assert_eq: {field: "logs[0].action", value: {str: "view_dashboard"}}
      - assert_eq: {field: "logs[1].action", value: {str: "login"}}
      - assert_eq: {field: "logs[0].user_id", value: {int: 1}}
