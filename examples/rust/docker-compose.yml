services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sqlt
      POSTGRES_PASSWORD: sqlt
      POSTGRES_DB: sqlt
    ports:
      - "5433:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqlt"]
      interval: 2s
      timeout: 5s
      retries: 10
