services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sqltgen
      POSTGRES_PASSWORD: sqltgen
      POSTGRES_DB: sqltgen
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqltgen"]
      interval: 2s
      timeout: 5s
      retries: 10
