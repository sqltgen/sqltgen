services:
  db:
    build: .
    ports:
      - "5433:5432"
    command: >
      postgres
        -c fsync=off
        -c synchronous_commit=off
        -c full_page_writes=off
        -c wal_level=minimal
        -c max_wal_senders=0
        -c autovacuum=off
        -c bgwriter_lru_maxpages=0
        -c shared_buffers=32MB
        -c work_mem=16MB
        -c max_connections=20
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqltgen"]
      interval: 0.1s
      timeout: 3s
      retries: 10
